<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Small Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="app-shell">
        <section class="app-card">
            <header class="app-header">
                <div>
                    <h1>Small Task Manager</h1>
                    <p class="subtitle">Organize your tasks with priorities and status tracking.</p>
                </div>
            </header>

            <section class="panel">
                <form id="task-form" class="task-form">
                    <input
                        id="title"
                        type="text"
                        placeholder="Enter task title"
                        required
                    />

                    <select id="priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>

                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>

                <form id="edit-form" class="task-form hidden">
                    <input
                        id="edit-title"
                        type="text"
                        placeholder="Edit task title"
                        required
                    />

                    <select id="edit-priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>

                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" id="cancel-edit" class="btn btn-secondary">Cancel</button>
                </form>
            </section>

            <section class="toolbar">
                <div class="message-wrap">
                    <p id="message" class="message"></p>
                </div>

                <div class="toolbar-actions">
                    <div class="filters">
                        <button type="button" class="filter-btn" data-filter="all">All</button>
                        <button type="button" class="filter-btn" data-filter="pending">Pending</button>
                        <button type="button" class="filter-btn" data-filter="completed">Completed</button>
                    </div>

                    <button id="clear-all-btn" type="button" class="btn btn-danger-outline">
                        Clear All
                    </button>
                </div>
            </section>

            <section class="task-section">
                <ul id="task-list" class="task-list"></ul>
            </section>
        </section>
    </main>

    <script src="renderer.js"></script>
</body>
</html>
