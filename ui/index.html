<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Small Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app">
        <h1>Small Task Manager</h1>

        <form id="task-form" class="task-form">
            <input id="title" type="text" placeholder="Enter task title" required />
            <select id="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Add Task</button>
        </form>

        <form id="edit-form" class="task-form hidden">
            <input id="edit-title" type="text" placeholder="Edit task title" required />
            <select id="edit-priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Save</button>
            <button type="button" id="cancel-edit">Cancel</button>
        </form>

        <div class="top-bar">
            <p id="message"></p>
            <button id="clear-all-btn" type="button">Clear All</button>
        </div>

        <div class="filters">
            <button type="button" data-filter="all">All</button>
            <button type="button" data-filter="pending">Pending</button>
            <button type="button" data-filter="completed">Completed</button>
        </div>

        <ul id="task-list"></ul>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
